<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNACK &amp; GARDEN — OPS</title>
  <meta name="description" content="스낵앤가든 팀리더용 크루 관리 · 일정관리 운영 시스템" />

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5.0.18/index.min.css" />
  <link rel="stylesheet" href="./css/styles.css?v=3" />
  <script>
    // 페인트 전에 저장된 테마 적용 (깜빡임 방지)
    (function () {
      try {
        var t = localStorage.getItem("sg-theme");
        if (t === "light") document.documentElement.setAttribute("data-theme", "light");
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div class="layout">

    <!-- ============ SIDEBAR ============ -->
    <aside class="side">
      <a class="brand" href="#dashboard">
        <span class="brand__mark">SNACK<em>&amp;</em>GARDEN</span>
        <span class="brand__sub">OPS · 운영관리 시스템</span>
      </a>

      <nav class="nav" aria-label="주요 메뉴">
        <p class="nav__label">MAIN</p>
        <a class="nav__item" data-view="dashboard">대시보드</a>

        <p class="nav__label">CREW</p>
        <a class="nav__item" data-view="crew">크루 목록</a>
        <a class="nav__item is-soon">면담 &amp; 근무기록</a>
        <a class="nav__item is-soon">성장 평가</a>
        <a class="nav__item is-soon">이슈 기록</a>
        <a class="nav__item is-soon">근태 요약</a>
        <a class="nav__item is-soon">교육 관련</a>
        <a class="nav__item is-soon">인사 변동</a>

        <p class="nav__label">OPERATION</p>
        <a class="nav__item" data-view="schedule">일정 관리</a>
        <a class="nav__item is-soon">운영 보고</a>
        <a class="nav__item is-soon">청구 관리</a>
        <a class="nav__item is-soon">노트 기록</a>
        <a class="nav__item is-soon">거래처 관리</a>
        <a class="nav__item is-soon">2026 KPI</a>

        <p class="nav__label">SYSTEM</p>
        <a class="nav__item is-soon">설정</a>
      </nav>

      <div class="side__foot">
        <span class="dot"></span> DEMO · 목업 데이터
      </div>
    </aside>

    <!-- ============ MAIN ============ -->
    <div class="main">
      <header class="topbar">
        <p class="topbar__crumb" id="viewTitle">SCHEDULE</p>
        <div class="topbar__right">
          <div class="search">
            <input type="search" placeholder="통합 검색" aria-label="통합 검색" />
            <kbd>/</kbd>
          </div>
          <button class="theme-toggle" id="themeToggle" aria-label="라이트/다크 테마 전환">
            <span class="knob"></span><span class="lbl">DARK</span>
          </button>
          <div class="avatar" title="제이미">J</div>
        </div>
      </header>

      <main class="view" id="view"><!-- rendered by app.js --></main>
    </div>

  </div>

  <script src="./js/config.js?v=3" defer></script>
  <script src="./js/data.js?v=3" defer></script>
  <script src="./js/app.js?v=3" defer></script>
</body>
</html>
